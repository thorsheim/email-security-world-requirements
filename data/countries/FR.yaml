country_code: FR
country_name: France
last_reviewed: "2026-04-13"
notes: >
  The French National Agency for Information Systems Security (ANSSI - Agence
  nationale de la sécurité des systèmes d'information) publishes security guides
  and recommendations. ANSSI's "Guide de l'hygiène informatique" and specific
  email security guides recommend SPF, DKIM, and DMARC for all organisations.
  The NIS2 transposition (Loi de programmation militaire and related decrees)
  adds obligations for operators of essential services (OES) and digital service
  providers (DSP).

authorities:
