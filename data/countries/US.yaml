country_code: US
country_name: United States
last_reviewed: "2026-04-13"
notes: >
  CISA Binding Operational Directives (BODs) and M-Memoranda apply to Federal
  Civilian Executive Branch (FCEB) agencies only. State, local, tribal, and
  territorial (SLTT) governments and the private sector are not covered by BODs,
  though CISA publishes guidance applicable to all. BOD 18-01 (October 2017) was
  the landmark mandate requiring SPF, DMARC (p=reject), and STARTTLS for .gov
  sending domains. BOD 20-01 expanded to all .gov domains.

authorities:
  "CISA": "https://www.cisa.gov/resources-tools/resources/email-security-best-practices"
  "ONCD": "https://www.whitehouse.gov/oncd/"

references:
  - title: "BOD 18-01 - Enhance Email and Web Security"
    url: "https://cyber.dhs.gov/bod/18-01/"
    publisher: "CISA / DHS"
    year: 2017
  - title: "BOD 20-01 - Develop and Publish a Vulnerability Disclosure Policy"
    url: "https://cyber.dhs.gov/bod/20-01/"
    publisher: "CISA"
    year: 2020
  - title: "CISA Email Security Best Practices"
    url: "https://www.cisa.gov/resources-tools/resources/email-security-best-practices"
    publisher: "CISA"
    year: 2024

requirements:
  - standard: SPF
    status: mandatory
    applies_to:
      - federal_agencies
    authority: "CISA"
    policy_document: "BOD 18-01"
    effective_date: "2018-01-15"
    references:
      - title: "BOD 18-01 - Technical Implementation"
        url: "https://cyber.dhs.gov/bod/18-01/"

  - standard: DKIM
    status: recommended
    applies_to:
      - federal_agencies
    authority: "CISA"
    policy_document: "BOD 18-01"
    notes: >
      DKIM is strongly recommended in BOD 18-01 guidance but SPF + DMARC is
      the minimum mandatory baseline. CISA guidance has increasingly emphasized
      DKIM as a best practice.
    references:
      - title: "BOD 18-01 - Technical Implementation"
        url: "https://cyber.dhs.gov/bod/18-01/"

  - standard: DMARC
    status: mandatory
    level: reject
    applies_to:
      - federal_agencies
    authority: "CISA"
    policy_document: "BOD 18-01"
    effective_date: "2018-10-16"
    deadline: "2018-10-16"
    notes: >
      p=reject was required within one year of the BOD issuance (by October 2018)
      for all .gov sending domains. Applies to all FCEB agencies.
    references:
      - title: "BOD 18-01 - Enhance Email and Web Security"
        url: "https://cyber.dhs.gov/bod/18-01/"

  - standard: STARTTLS
    status: mandatory
    applies_to:
      - federal_agencies
    authority: "CISA"
    policy_document: "BOD 18-01"
    effective_date: "2018-01-15"
    references:
      - title: "BOD 18-01 - Enhance Email and Web Security"
        url: "https://cyber.dhs.gov/bod/18-01/"

  - standard: DANE
    status: informational
    applies_to:
      - federal_agencies
    notes: >
      No federal mandate for DANE as of 2026. CISA acknowledges DANE in general
      guidance but it is not required. Many .gov domains lack DNSSEC, making
      DANE deployment difficult at scale.

  - standard: MTA-STS
    status: recommended
    applies_to:
      - federal_agencies
    authority: "CISA"
    notes: >
      Recommended in CISA email security best practices as a complement to
      STARTTLS. Not a BOD requirement.
    references:
      - title: "CISA Email Security Best Practices"
        url: "https://www.cisa.gov/resources-tools/resources/email-security-best-practices"

  - standard: TLS-RPT
    status: recommended
    applies_to:
      - federal_agencies
    authority: "CISA"
    notes: >
      Recommended alongside MTA-STS. Provides visibility into TLS failures
      but not a mandated requirement.
    references:
      - title: "CISA Email Security Best Practices"
        url: "https://www.cisa.gov/resources-tools/resources/email-security-best-practices"

  - standard: DNSSEC
    status: mandatory
    applies_to:
      - federal_agencies
    authority: "CISA"
    policy_document: "BOD 18-01"
    effective_date: "2018-01-15"
    notes: >
      BOD 18-01 requires DNSSEC for all .gov second-level domains. This predates
      the email-specific requirements and covers all federal civilian executive branch
      agency domains.
    references:
      - title: "BOD 18-01 - Enhance Email and Web Security"
        url: "https://cyber.dhs.gov/bod/18-01/"

  - standard: CAA
    status: recommended
    applies_to:
      - federal_agencies
    authority: "CISA"
    notes: >
      CISA recommends CAA records as part of general domain security best practices.
      Not a BOD-level mandate but referenced in CISA guidance on certificate security.
    references:
      - title: "CISA Email Security Best Practices"
        url: "https://www.cisa.gov/resources-tools/resources/email-security-best-practices"

  - standard: RPKI
    status: informational
    applies_to:
      - federal_agencies
    authority: "CISA"
    notes: >
      CISA has referenced RPKI in routing security guidance and advisories as an
      important emerging protection. No BOD-level mandate for RPKI as of 2026.

  - standard: RPKI
    status: recommended
    applies_to:
      - federal_agencies
      - private_sector
    authority: "ONCD"
    policy_document: "Roadmap to Enhancing Internet Routing Security"
    effective_date: "2024-03-01"
    notes: >
      The White House Office of the National Cyber Director (ONCD) published a
      "Roadmap to Enhancing Internet Routing Security" in March 2024. It calls on
      network operators, ISPs, and federal agencies to deploy RPKI Route Origin
      Authorizations (ROAs) and enable Route Origin Validation (ROV) to protect
      against BGP hijacking. The roadmap targets near-term RPKI adoption across
      critical infrastructure and federal networks.
    references:
      - title: "Roadmap to Enhancing Internet Routing Security — ONCD (March 2024)"
        url: "https://www.whitehouse.gov/wp-content/uploads/2024/03/Roadmap-to-Enhancing-Internet-Routing-Security.pdf"

  - standard: ASPA
    status: informational
    applies_to:
      - federal_agencies
      - private_sector
    authority: "ONCD"
    policy_document: "Roadmap to Enhancing Internet Routing Security"
    notes: >
      The ONCD routing security roadmap acknowledges ASPA and path validation as a
      longer-term complement to RPKI ROA. It is listed as a future capability that
      operators should monitor as the standard matures through IETF.
    references:
      - title: "Roadmap to Enhancing Internet Routing Security — ONCD (March 2024)"
        url: "https://www.whitehouse.gov/wp-content/uploads/2024/03/Roadmap-to-Enhancing-Internet-Routing-Security.pdf"

  - standard: DNSSEC
    status: recommended
    applies_to:
      - federal_agencies
      - private_sector
    authority: "ONCD"
    policy_document: "Roadmap to Enhancing Internet Routing Security"
    notes: >
      The ONCD roadmap calls out DNSSEC as critical infrastructure-level protection
      needed to secure the DNS lookups that underpin email routing, SPF, and DMARC.
      DNSSEC is already mandatory for federal agencies under CISA BOD 18-01; the
      ONCD roadmap extends the recommendation to network operators and ISPs broadly.
    references:
      - title: "Roadmap to Enhancing Internet Routing Security — ONCD (March 2024)"
        url: "https://www.whitehouse.gov/wp-content/uploads/2024/03/Roadmap-to-Enhancing-Internet-Routing-Security.pdf"

  - standard: BIMI
    status: informational
    applies_to:
      - federal_agencies
    notes: "No federal guidance on BIMI as of 2026."
